<!DOCTYPE html>
<html lang="ms">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Plastik Keselamatan SPM</title>
  <style>
    :root { --blue:#083b86; --blue2:#0a57b7; --cyan:#11a8df; --red:#ef2e32; --dark:#10233f; --muted:#64748b; --bg:#eef5ff; --card:#ffffff; --line:#d9e4f2; }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,#ffffff 0,#edf6ff 28%,#f7fbff 75%);color:var(--dark)}
    .wrap{max-width:1200px;margin:auto;padding:18px} .hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--blue),#061b55);color:#fff;border-radius:30px;padding:24px;display:flex;align-items:center;gap:20px;box-shadow:0 20px 48px rgba(8,59,134,.28)}
    .hero:after{content:"";position:absolute;right:-80px;top:-90px;width:300px;height:300px;background:rgba(239,46,50,.22);border-radius:50%} .logo{width:118px;height:118px;object-fit:contain;background:#fff;border-radius:24px;padding:8px;z-index:1} .heroText{z-index:1} .tag{display:inline-block;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);padding:7px 12px;border-radius:999px;font-weight:700;font-size:13px} h1{margin:12px 0 6px;font-size:29px;line-height:1.12;text-transform:uppercase} .hero p{margin:0;opacity:.93}
    .dash{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0} .stat{background:#fff;border-radius:22px;padding:18px;box-shadow:0 12px 28px rgba(31,54,88,.10);border:1px solid #edf2f9;position:relative;overflow:hidden} .stat:before{content:"";position:absolute;left:0;top:0;width:7px;height:100%;background:var(--blue2)} .stat:nth-child(2):before{background:var(--red)} .stat:nth-child(3):before{background:var(--cyan)} .stat:nth-child(4):before{background:#111827} .label{font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);font-weight:900} .num{font-size:34px;font-weight:900;margin-top:7px}
    .main{display:block;max-width:920px;margin:0 auto} .card{background:#fff;border-radius:26px;padding:22px;box-shadow:0 12px 30px rgba(31,54,88,.10);border:1px solid #edf2f9} h2{margin:0 0 16px;color:var(--blue);font-size:21px} .formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px} .full{grid-column:1/-1} label{display:block;font-weight:900;margin-bottom:7px;font-size:14px} input,select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:15px;font-size:15px;background:#fff;outline:none} input:focus,select:focus{border-color:var(--blue2);box-shadow:0 0 0 4px rgba(10,87,183,.09)} input[readonly]{background:#f1f5f9;font-weight:900;color:#0f172a} .btn{border:0;background:linear-gradient(135deg,var(--red),#ff6969);color:#fff;font-weight:900;padding:15px 22px;border-radius:16px;cursor:pointer;width:100%;font-size:16px;box-shadow:0 12px 22px rgba(239,46,50,.25)} .btn:disabled{opacity:.55;cursor:not-allowed} .msg{margin-top:12px;font-weight:900} .ok{color:#15803d} .bad{color:#b91c1c}
    .note{background:linear-gradient(180deg,#f8fbff,#f1f7ff);border-left:6px solid var(--cyan);padding:15px;border-radius:16px;line-height:1.55;color:#334155} .tools{display:flex;gap:10px;margin:12px 0 0} .mini{background:#f8fafc;border:1px solid var(--line);color:#0f172a;border-radius:14px;padding:11px 12px;font-weight:900;cursor:pointer} .tableWrap{overflow:auto;max-height:340px;border:1px solid var(--line);border-radius:16px} table{width:100%;border-collapse:collapse;font-size:13px} th,td{border-bottom:1px solid #e8eef7;padding:10px;text-align:left;white-space:nowrap} th{background:#f1f5f9;color:#0f172a;position:sticky;top:0} .search{margin-bottom:10px}
    @media(max-width:850px){.hero{flex-direction:column;text-align:center}.dash,.main,.formgrid{grid-template-columns:1fr}.full{grid-column:auto}h1{font-size:23px}}
  </style>
</head>

    <div class="heroText"><span class="tag">SPP JABATAN PENDIDIKAN NEGERI JOHOR</span><h1>Aplikasi Pengisian Penggunaan Plastik Keselamatan SPM</h1><p>Borang rasmi pengisian dan dashboard automatik penggunaan plastik keselamatan SPM.</p></div>
  </section>

  <section class="dash">
    <div class="stat"><div class="label">Plastik Digunakan</div><div class="num" id="dashDigunakan">0</div></div>
    <div class="stat"><div class="label">Plastik Rosak</div><div class="num" id="dashRosak">0</div></div>
    <div class="stat"><div class="label">Jumlah Keseluruhan</div><div class="num" id="dashKeseluruhan">0</div></div>
    <div class="stat"><div class="label">Jumlah Rekod</div><div class="num" id="dashRekod">0</div></div>
  </section>

  <section class="main">
    <div class="card">
      <h2>Borang Pengisian</h2>
      <form id="formSPM">
        <div class="formgrid">
          <div><label>Tarikh</label><input type="date" id="tarikh" required></div>
          <div><label>Hari</label><select id="hari" required><option value="">Pilih Hari</option><option>Isnin</option><option>Selasa</option><option>Rabu</option><option>Khamis</option><option>Jumaat</option><option>Sabtu</option><option>Ahad</option></select></div>
          <div><label>Kod Subjek SPM</label><select id="kodSubjek" required><option value="">Pilih Kod Subjek</option></select></div>
          <div><label>Subjek SPM</label><input type="text" id="subjek" readonly required></div>
          <div><label>Kod Pusat Peperiksaan</label><select id="kodPusat" required><option value="">Pilih Kod Pusat</option></select></div>
          <div><label>Nama Pusat Peperiksaan</label><input type="text" id="namaPusat" readonly required></div>
          <div><label>Bilangan Plastik Keselamatan Digunakan</label><input type="number" id="digunakan" min="0" value="0" required></div>
          <div><label>Bilangan Plastik Rosak</label><input type="number" id="rosak" min="0" value="0" required></div>
          <div class="full"><label>Nama Penyelia Kawasan</label><select id="penyelia" required><option value="">Pilih Penyelia Kawasan</option></select></div>
          <div class="full"><button class="btn" id="btnSubmit" type="submit">HANTAR REKOD</button><div class="msg" id="msg"></div></div>
        </div>
      </form>
    </div>

  </section>
</div>
<script>
let subjects=[], centres=[], supervisors=[];
const $=id=>document.getElementById(id);
function cleanCode(v){
  v=String(v||'').trim();
  const m=v.match(/^(?:Sun|Mon|Tue|Wed|Thu|Fri|Sat)\s+\w{3}\s+\d{2}\s+(\d{3,5})\s+/i);
  return m ? m[1] : v.replace(/^'+/,'').trim();
}
function fillSelect(id, arr, placeholder){
  const el=$(id); el.innerHTML='<option value="">'+placeholder+'</option>';
  arr.forEach(item=>{ const opt=document.createElement('option'); const val=typeof item==='string'?item:cleanCode(item.code); opt.value=val; opt.textContent=val; el.appendChild(opt); });
}
function updateDash(d){ $('dashDigunakan').textContent=d.digunakan||0; $('dashRosak').textContent=d.rosak||0; $('dashKeseluruhan').textContent=d.keseluruhan||0; $('dashRekod').textContent=d.rekod||0; }
function refreshData(){ google.script.run.withSuccessHandler(init).withFailureHandler(showErr).getInitialData(); }
function init(data){ subjects=data.subjects||[]; centres=data.centres||[]; supervisors=data.supervisors||[]; fillSelect('kodSubjek',subjects,'Pilih Kod Subjek'); fillSelect('kodPusat',centres,'Pilih Kod Pusat'); fillSelect('penyelia',supervisors,'Pilih Penyelia Kawasan'); updateDash(data.dashboard||{}); }
function showErr(err){ $('msg').className='msg bad'; $('msg').textContent=(err&&err.message)?err.message:String(err); }
$('kodSubjek').addEventListener('change',()=>{ const code=cleanCode($('kodSubjek').value); const found=subjects.find(s=>cleanCode(s.code)===code); $('subjek').value=found?found.name:''; });
$('kodPusat').addEventListener('change',()=>{ const code=cleanCode($('kodPusat').value); const found=centres.find(c=>cleanCode(c.code)===code); $('namaPusat').value=found?found.name:''; });
$('tarikh').addEventListener('change',()=>{ const d=new Date($('tarikh').value+'T00:00:00'); const hari=['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu']; if(!isNaN(d)) $('hari').value=hari[d.getDay()]; });
$('formSPM').addEventListener('submit',e=>{
  e.preventDefault(); $('btnSubmit').disabled=true; $('msg').className='msg'; $('msg').textContent='Sedang menghantar...';
  const form={ tarikh:$('tarikh').value, hari:$('hari').value, kodSubjek:cleanCode($('kodSubjek').value), subjek:$('subjek').value, kodPusat:cleanCode($('kodPusat').value), namaPusat:$('namaPusat').value, digunakan:$('digunakan').value, rosak:$('rosak').value, penyelia:$('penyelia').value };
  google.script.run.withSuccessHandler(res=>{ $('btnSubmit').disabled=false; $('msg').className='msg ok'; $('msg').textContent=res.message; updateDash(res.dashboard||{}); $('formSPM').reset(); $('digunakan').value=0; $('rosak').value=0; }).withFailureHandler(err=>{ $('btnSubmit').disabled=false; showErr(err); }).submitRecord(form);
});
refreshData();
</script>
</body>
